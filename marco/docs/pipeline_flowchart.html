<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PGx Reporter Pipeline Flowchart</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #fff;
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
  }
  .chart-container {
    display: flex;
    justify-content: center;
    padding: 10px;
  }
  svg text {
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
  }
</style>
</head>
<body>
<div class="chart-container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1340" width="900" height="1340">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#455a64"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrow-grey" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#757575"/>
    </marker>
    <!-- Drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ============================================================ -->
  <!-- Title -->
  <!-- ============================================================ -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#263238">
    PGx Reporter Pipeline
  </text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#78909c">
    From VCF input to pharmacogenomic reports
  </text>

  <!-- ============================================================ -->
  <!-- STAGE 1: Input -->
  <!-- ============================================================ -->
  <!-- VCF file (parallelogram / input shape) -->
  <polygon points="370,90 530,90 510,140 350,140" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">VCF File</text>
  <text x="440" y="128" text-anchor="middle" font-size="10" fill="#1565c0">(GRCh38)</text>

  <!-- Arrow down -->
  <line x1="440" y1="140" x2="440" y2="170" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 2: Validation -->
  <!-- ============================================================ -->
  <rect x="325" y="175" width="230" height="50" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">VCF Validation</text>
  <text x="440" y="212" text-anchor="middle" font-size="10" fill="#bf360c">vcf_validator.py</text>

  <!-- Validation checks annotation (left side) -->
  <rect x="60" y="168" width="220" height="65" rx="6" fill="#fafafa" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="170" y="185" text-anchor="middle" font-size="10" fill="#616161" font-style="italic">Checks performed:</text>
  <text x="170" y="199" text-anchor="middle" font-size="10" fill="#757575">File format &amp; extension</text>
  <text x="170" y="213" text-anchor="middle" font-size="10" fill="#757575">Required VCF headers</text>
  <text x="170" y="227" text-anchor="middle" font-size="10" fill="#757575">Genome build (GRCh38 required)</text>
  <line x1="280" y1="200" x2="325" y2="200" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow down -->
  <line x1="440" y1="225" x2="440" y2="260" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="247" font-size="9" fill="#2e7d32" font-style="italic">valid</text>

  <!-- ============================================================ -->
  <!-- STAGE 3: PharmCAT Execution -->
  <!-- ============================================================ -->
  <rect x="305" y="265" width="270" height="60" rx="8" fill="#e8eaf6" stroke="#283593" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#283593">PharmCAT</text>
  <text x="440" y="308" text-anchor="middle" font-size="10" fill="#3949ab">runner.py  |  Java subprocess</text>

  <!-- PharmCAT annotation (right side) -->
  <rect x="625" y="258" width="225" height="75" rx="6" fill="#fafafa" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="737" y="276" text-anchor="middle" font-size="10" fill="#616161" font-style="italic">PharmCAT modules:</text>
  <text x="737" y="292" text-anchor="middle" font-size="10" fill="#757575">Named Allele Matcher</text>
  <text x="737" y="306" text-anchor="middle" font-size="10" fill="#757575">Phenotyper</text>
  <text x="737" y="320" text-anchor="middle" font-size="10" fill="#757575">Reporter</text>
  <line x1="575" y1="295" x2="625" y2="295" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Three output arrows from PharmCAT -->
  <line x1="370" y1="325" x2="200" y2="380" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="325" x2="440" y2="380" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="325" x2="680" y2="380" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- PharmCAT Output Files -->
  <!-- ============================================================ -->
  <!-- match.json -->
  <polygon points="120,385 280,385 260,425 100,425" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">.match.json</text>
  <text x="190" y="417" text-anchor="middle" font-size="9" fill="#8e24aa">Diplotype candidates</text>

  <!-- phenotype.json -->
  <polygon points="360,385 520,385 500,425 340,425" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">.phenotype.json</text>
  <text x="430" y="417" text-anchor="middle" font-size="9" fill="#8e24aa">Phenotype assignment</text>

  <!-- report.json -->
  <polygon points="600,385 760,385 740,425 580,425" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">.report.json</text>
  <text x="670" y="417" text-anchor="middle" font-size="9" fill="#8e24aa">Drug recommendations</text>

  <!-- Converge arrows to parser -->
  <line x1="190" y1="425" x2="375" y2="480" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="425" x2="430" y2="480" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="425" x2="505" y2="480" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 4: Output Parser -->
  <!-- ============================================================ -->
  <rect x="315" y="485" width="250" height="55" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="508" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Output Parser</text>
  <text x="440" y="524" text-anchor="middle" font-size="10" fill="#bf360c">output_parser.py</text>

  <!-- Parser annotation (left side) -->
  <rect x="50" y="470" width="220" height="80" rx="6" fill="#fafafa" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="160" y="487" text-anchor="middle" font-size="10" fill="#616161" font-style="italic">Key operations:</text>
  <text x="160" y="501" text-anchor="middle" font-size="10" fill="#757575">Cross-reference match + report</text>
  <text x="160" y="515" text-anchor="middle" font-size="10" fill="#757575">Classify gene call confidence</text>
  <text x="160" y="529" text-anchor="middle" font-size="10" fill="#757575">Score drug urgency (traffic light)</text>
  <text x="160" y="543" text-anchor="middle" font-size="10" fill="#757575">Categorize drugs therapeutically</text>
  <line x1="270" y1="510" x2="315" y2="510" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Three arrows from parser: gene classification -->
  <line x1="380" y1="540" x2="190" y2="600" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <line x1="440" y1="540" x2="440" y2="600" stroke="#e65100" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="500" y1="540" x2="690" y2="600" stroke="#757575" stroke-width="1.8" marker-end="url(#arrow-grey)"/>

  <!-- ============================================================ -->
  <!-- STAGE 5: Gene Classification -->
  <!-- ============================================================ -->
  <!-- Section label -->
  <text x="450" y="590" text-anchor="middle" font-size="11" fill="#455a64" font-weight="bold">GENE CLASSIFICATION</text>

  <!-- Definitive box -->
  <rect x="90" y="605" width="200" height="65" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="625" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Definitive</text>
  <text x="190" y="641" text-anchor="middle" font-size="10" fill="#388e3c">Single diplotype identified</text>
  <text x="190" y="656" text-anchor="middle" font-size="9" fill="#4caf50">e.g. CYP3A5 *3/*3</text>

  <!-- Ambiguous box -->
  <rect x="340" y="605" width="200" height="65" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="625" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Ambiguous</text>
  <text x="440" y="641" text-anchor="middle" font-size="10" fill="#bf360c">Multiple candidates</text>
  <text x="440" y="656" text-anchor="middle" font-size="9" fill="#ff9800">e.g. CYP2C19: 528 possibilities</text>

  <!-- No Call box -->
  <rect x="590" y="605" width="200" height="65" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="690" y="625" text-anchor="middle" font-size="12" font-weight="bold" fill="#616161">No Call</text>
  <text x="690" y="641" text-anchor="middle" font-size="10" fill="#757575">No variants in VCF</text>
  <text x="690" y="656" text-anchor="middle" font-size="9" fill="#9e9e9e">e.g. CYP2D6, CYP3A4</text>

  <!-- Converge arrows to report generation -->
  <line x1="190" y1="670" x2="340" y2="735" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="670" x2="440" y2="735" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="670" x2="540" y2="735" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 6: Report Generation (split) -->
  <!-- ============================================================ -->
  <text x="450" y="725" text-anchor="middle" font-size="11" fill="#455a64" font-weight="bold">REPORT GENERATION</text>

  <rect x="315" y="740" width="250" height="50" rx="8" fill="#fce4ec" stroke="#b71c1c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="762" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">Jinja2 Template Engine</text>
  <text x="440" y="778" text-anchor="middle" font-size="10" fill="#c62828">HTML rendering</text>

  <!-- Split to two report types -->
  <line x1="380" y1="790" x2="240" y2="840" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="790" x2="640" y2="840" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- Patient Report -->
  <!-- ============================================================ -->
  <rect x="100" y="845" width="280" height="145" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="868" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Patient Report</text>
  <text x="240" y="884" text-anchor="middle" font-size="10" fill="#2e7d32">patient_report.py</text>
  <line x1="120" y1="893" x2="360" y2="893" stroke="#a5d6a7" stroke-width="1"/>
  <text x="130" y="910" font-size="10" fill="#455a64">  Traffic-light summary dashboard</text>
  <text x="130" y="925" font-size="10" fill="#455a64">  Plain-language gene explanations</text>
  <text x="130" y="940" font-size="10" fill="#455a64">  Actionable medications flagged</text>
  <text x="130" y="955" font-size="10" fill="#455a64">  Ambiguous results with risk warnings</text>
  <text x="130" y="970" font-size="10" fill="#455a64">  Glossary &amp; next steps</text>
  <text x="130" y="985" font-size="10" fill="#455a64">  Disclaimer</text>

  <!-- Clinician Report -->
  <rect x="510" y="845" width="295" height="145" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="657" y="868" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">Clinician Report</text>
  <text x="657" y="884" text-anchor="middle" font-size="10" fill="#1565c0">clinician_report.py</text>
  <line x1="530" y1="893" x2="785" y2="893" stroke="#90caf9" stroke-width="1"/>
  <text x="523" y="910" font-size="10" fill="#455a64">  Executive summary table</text>
  <text x="523" y="925" font-size="10" fill="#455a64">  Full diplotype/phenotype/activity scores</text>
  <text x="523" y="940" font-size="10" fill="#455a64">  All drug annotations (CPIC + DPWG)</text>
  <text x="523" y="955" font-size="10" fill="#455a64">  Evidence classification &amp; citations</text>
  <text x="523" y="970" font-size="10" fill="#455a64">  VCF coverage &amp; QC methodology</text>
  <text x="523" y="985" font-size="10" fill="#455a64">  Consolidated references (PubMed)</text>

  <!-- Arrows to output formats -->
  <line x1="200" y1="990" x2="200" y2="1040" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="990" x2="280" y2="1040" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="617" y1="990" x2="617" y2="1040" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="697" y1="990" x2="697" y2="1040" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 7: Output Files -->
  <!-- ============================================================ -->
  <!-- Patient HTML -->
  <rect x="145" y="1045" width="110" height="40" rx="6" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="1069" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">HTML</text>

  <!-- Patient PDF -->
  <rect x="225" y="1045" width="110" height="40" rx="6" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="1069" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">PDF</text>

  <!-- Clinician HTML -->
  <rect x="562" y="1045" width="110" height="40" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="617" y="1069" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">HTML</text>

  <!-- Clinician PDF -->
  <rect x="642" y="1045" width="110" height="40" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="697" y="1069" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">PDF</text>

  <!-- ============================================================ -->
  <!-- Future: Streamlit (dashed) -->
  <!-- ============================================================ -->
  <line x1="240" y1="1085" x2="240" y2="1110" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="657" y1="1085" x2="657" y2="1110" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Converge to Streamlit -->
  <line x1="240" y1="1110" x2="400" y2="1140" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-grey)"/>
  <line x1="657" y1="1110" x2="500" y2="1140" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-grey)"/>

  <rect x="345" y="1145" width="210" height="50" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="450" y="1168" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">Streamlit Web App</text>
  <text x="450" y="1183" text-anchor="middle" font-size="10" fill="#bdbdbd">(future)</text>

  <!-- ============================================================ -->
  <!-- Legend -->
  <!-- ============================================================ -->
  <rect x="60" y="1230" width="780" height="95" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="1252" text-anchor="middle" font-size="12" font-weight="bold" fill="#455a64">Legend</text>

  <!-- Input -->
  <polygon points="85,1265 135,1265 130,1280 80,1280" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="150" y="1276" font-size="10" fill="#455a64">Input / Output file</text>

  <!-- Process -->
  <rect x="280" y="1263" width="50" height="18" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="340" y="1276" font-size="10" fill="#455a64">Processing step</text>

  <!-- Annotation -->
  <rect x="475" y="1263" width="50" height="18" rx="3" fill="#fafafa" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="535" y="1276" font-size="10" fill="#455a64">Annotation / detail</text>

  <!-- Future -->
  <rect x="680" y="1263" width="50" height="18" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="740" y="1276" font-size="10" fill="#455a64">Future</text>

  <!-- Color coding -->
  <circle cx="100" cy="1305" r="6" fill="#2e7d32"/>
  <text x="112" y="1309" font-size="10" fill="#455a64">Definitive call</text>

  <circle cx="250" cy="1305" r="6" fill="#e65100"/>
  <text x="262" y="1309" font-size="10" fill="#455a64">Ambiguous call</text>

  <circle cx="400" cy="1305" r="6" fill="#757575"/>
  <text x="412" y="1309" font-size="10" fill="#455a64">No call / no data</text>

  <circle cx="560" cy="1305" r="6" fill="#1565c0"/>
  <text x="572" y="1309" font-size="10" fill="#455a64">Clinician-facing</text>

  <circle cx="700" cy="1305" r="6" fill="#2e7d32"/>
  <text x="712" y="1309" font-size="10" fill="#455a64">Patient-facing</text>

</svg>
</div>
</body>
</html>
